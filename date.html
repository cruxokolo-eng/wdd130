<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Girlfriend?</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #e91e63;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
        }

        #yesBtn:hover {
            background: #45a049;
        }

        #noBtn {
            background: #f44336;
            color: white;
            position: relative;
        }

        #message {
            margin-top: 20px;
            font-size: 22px;
            color: #e91e63;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>❤️ Will You Be My Girlfriend? ❤️</h1>
        <p>You make my days brighter, and I'd love to spend more time with you. You can't say no. lol</p>

        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😢</button>

        <div id="message"></div>
    </div>

    <script>
        const yesBtn = document.getElementById("yesBtn");
        const noBtn = document.getElementById("noBtn");
        const message = document.getElementById("message");

        const moveNoButton = () => {
            const x = Math.random() * 300 - 150;
            const y = Math.random() * 300 - 150;
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        };

        yesBtn.addEventListener("click", () => {
            message.innerHTML = "🎉 Yay! I can't wait! ❤️";
        });

        noBtn.addEventListener("mouseover", moveNoButton);

        noBtn.addEventListener("touchstart", (event) => {
            event.preventDefault();
            moveNoButton();
        }, { passive: false });

        noBtn.addEventListener("pointerdown", (event) => {
            if (event.pointerType === "touch") {
                event.preventDefault();
                moveNoButton();
            }
        });

        noBtn.addEventListener("click", (event) => {
            if (window.matchMedia("(pointer: coarse)").matches) {
                event.preventDefault();
                event.stopPropagation();
                moveNoButton();
                message.innerHTML = "😅 Nice try!";
                return;
            }

            message.innerHTML = "😊 Thanks for being honest. I wish you all the best!";
        });
    </script>

</body>

</html>
